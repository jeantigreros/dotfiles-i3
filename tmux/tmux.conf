# change prefix to Alt - A
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# move through panes by vim-like keybinds
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# set the mouse support on
set -g mouse on

# set Tab to swtich to the next window
bind Tab next-window

# set t to create a new window
bind t new-window

# set w to create divided pane
bind w split-window -v

# set w to create divided pane
bind e split-window -h

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# bind-key -T copy-mode-vi c send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
set-option -g set-clipboard external
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -i -selection clipboard'  # macOS
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -i -selection clipboard'
